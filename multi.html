function beginRoundWithSeed(seed) {
  if(seed == null) return;
  if(spectatorMode && matchActive) return;
  if(startedSeed === seed) return;
  if(countdownInProgress) {
    // If a newer seed arrives during countdown, keep the countdown running
    // and just update the seed that will be used at match start.
    gameSeed = seed;
    countdownSeed = seed;
    return;
  }
  gameSeed = seed;
  countdownSeed = seed;
  startCountdown();
}

function onData(data, fromConn) {
  const rp = getOpponentByConn(fromConn);
  if(!rp) return;
  if(data.type === 'pos') {
    const d = rp.data;
    d.x=data.x; d.y=data.y; d.w=data.w||PLAYER_W; d.h=data.h||PLAYER_H;
    d.facing=data.facing; d.squash=data.squash; d.score=data.score; d.cameraY=data.cameraY;
    d.shooting=data.shooting; d.backflipping=data.backflipping; d.backflipAngle=data.backflipAngle;
    d.stunned=data.stunned; d.stunnedTime=data.stunnedTime; d.suckedIn=data.suckedIn;
    d.abducted=data.abducted; d.shrink=data.shrink; d.shielded=data.shielded;
    // Jump sound if on screen
    if(data.jumping && !rp._wasJumping) {
      const cameraDiff = data.cameraY - cameraY;
      const drawY = data.y - cameraDiff;
      if(drawY > -PLAYER_H && drawY < H + PLAYER_H) playSound(SND_JUMP, 0.2);
    }
    rp._wasJumping = !!data.jumping;
    if(data.trampoline) playTrampolineSound();
    // Relay to other connections (host relays)
    if(isHost) { for(const p2 of conns) { if(p2 !== rp) sendTo(p2, {...data, type:'relayPos', from:rp.pseudo, fromId:rp.id}); } }
  }
  else if(data.type === 'relayPos') {
    const target = ensureRemotePlayer(data.from, null, data.fromId || null);
    if(target) {
      const d = target.data;
      d.x=data.x; d.y=data.y; d.w=data.w||PLAYER_W; d.h=data.h||PLAYER_H;
      d.facing=data.facing; d.squash=data.squash; d.score=data.score; d.cameraY=data.cameraY;
      d.shooting=data.shooting; d.backflipping=data.backflipping; d.backflipAngle=data.backflipAngle;
      d.stunned=data.stunned; d.stunnedTime=data.stunnedTime; d.suckedIn=data.suckedIn;
      d.abducted=data.abducted; d.shrink=data.shrink; d.shielded=data.shielded;
    }
  }
  else if(data.type === 'myWorld') {
    if(isHost && data.world) rp._worldData = data.world;
  }
  else if(data.type === 'dead') {
    rp.dead = true; rp.spectating = true; rp.data.dead = true; rp.data.score = data.score;
    if(isHost) { for(const p2 of conns) { if(p2 !== rp) sendTo(p2, {type:'playerDead', pseudo:rp.pseudo, id:rp.id, score:data.score}); } }
    // Show notification
    showNotification(rp.pseudo + ' est éliminé !', 'kill');
    if(isHost) broadcastRoster();
    if(isHost) sendTo(rp, { type:'worldSync', world: makeWorldSnapshot() });
    if(matchActive && !finishReached && getActiveAliveCount() <= 1) showResults();
  }
  else if(data.type === 'playerDead') {
    const target = ensureRemotePlayer(data.pseudo, null, data.id || null);
    if(target) { target.dead = true; target.spectating = true; target.data.dead = true; target.data.score = data.score; }
    showNotification(data.pseudo + ' est éliminé !', 'kill');
    if(matchActive && !finishReached && getActiveAliveCount() <= 1) showResults();
  }
  else if(data.type === 'win') {
    rp.data.score = data.score;
    playWinSound();
    if(isHost) { for(const p2 of conns) { if(p2 !== rp) sendTo(p2, {type:'playerWin', pseudo:rp.pseudo, id:rp.id, score:data.score}); } }
    if(!finishReached && matchActive) showResults();
  }
  else if(data.type === 'playerWin') {
    const target = ensureRemotePlayer(data.pseudo, null, data.id || null);
    if(target) { target.data.score = data.score; }
    playWinSound();
    if(!finishReached && matchActive) showResults();
  }
  else if(data.type === 'nextReady') {
    rp.readyForNext = true;
    updateReadyStatus();
    if(meReadyForNext && allOpponentsReady()) startNextRound();
  }
  else if(data.type === 'sound') {
    if(data.snd === 'death') playDeathSound();
    else if(data.snd === 'trap') playTrapSound();
    else if(data.snd === 'hole') playHoleSound();
    else if(data.snd === 'win') playWinSound();
    else if(data.snd === 'monsterDead') playMonsterDeadSound();
    else if(data.snd === 'soucoupe') playSoucoupeSound();
    else if(data.snd === 'retrecit') playRetrecitSound();
    else if(data.snd === 'shield') playShieldSound();
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
  }
  else if(data.type === 'monsterKill') {
    killedEnemies.add(data.id);
    for(const m of monsters) { if(m.alive && m.id === data.id) { m.alive=false; spawnParticles(m.x+m.w/2,m.y,'#42a5f5',12); stopMonsterSound(); playMonsterDeadSound(); break; } }
    for(const b of blueMonsters) { if(b.alive && b.id === data.id) { b.alive=false; spawnParticles(b.x+b.w/2,b.y,'#42a5f5',12); stopMonsterSound(); playMonsterDeadSound(); break; } }
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
  }
  else if(data.type === 'soucoupeKill') {
    killedEnemies.add(data.id);
    for(const s of soucoupes) { if(s.alive && s.id === data.id) { s.alive=false; spawnParticles(s.x+s.w/2,s.y+s.h/2,'#8bc34a',15); stopSoucoupeSound(); playMonsterDeadSound(); if(beingAbducted){beingAbducted=false;abductionShrink=1;player.w=PLAYER_W;player.h=PLAYER_H;} break; } }
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
  }
  else if(data.type === 'pseudo') {
    rp.pseudo = data.pseudo;
    if(data.id) rp.id = data.id;
    if(data.skinId && skinImages[data.skinId]) {
      rp.skinId = data.skinId;
      rp.playerImg = skinImages[data.skinId];
      rp.shootImg = skinShootImages[data.skinId];
    }
    // Notify others about new player
    if(isHost) {
      for(const p2 of conns) { if(p2!==rp) sendTo(p2, {type:'playerJoined', id:rp.id, pseudo:rp.pseudo, skinId:rp.skinId}); }
      broadcastRoster();
    }
    refreshResultPlayers();
  }
  else if(data.type === 'showScores') {
    ++countdownCancelToken;
    countdownInProgress = false;
    running = false;
    matchActive = false;
    spectatorMode = true;
    meReadyForNext = false;
    document.getElementById('btnPlayAgain').disabled = false;
    document.getElementById('readyStatus').textContent = '';
    resetKickVote();
    initKickButton();
    const titleEl = document.getElementById('resultTitle');
    titleEl.textContent = 'En attente de la prochaine manche';
    titleEl.className = 'result-title win';
    document.getElementById('btnPlayAgain').textContent = 'Rejoindre la prochaine manche';
    const rs = document.getElementById('resultScreen');
    ['lobbyScreen','waitingScreen','getReadyScreen','goScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
    rs.classList.remove('hidden');
    rs.offsetHeight;
    rs.classList.add('visible');
    document.getElementById('chatToggle').style.display = '';
    refreshResultPlayers();
  }
  else if(data.type === 'playerJoined') {
    ensureRemotePlayer(data.pseudo, data.skinId, data.id || null);
    showNotification(data.pseudo + ' a rejoint la partie');
    refreshResultPlayers();
  }
  else if(data.type === 'finalScores') {
    const myId = peer && peer.id ? peer.id : null;
    for(const pl of (data.players || [])) {
      if(!pl) continue;
      if(myId && pl.id === myId) {
        myPoints = Number(pl.pts) || 0;
      } else {
        const t = (pl.id ? conns.find(p => p.id === pl.id) : null) || conns.find(p => p.pseudo === pl.pseudo);
        if(t) t.pts = Number(pl.pts) || 0;
      }
    }
    refreshResultPlayers();
  }
  else if(data.type === 'roster') {
    const arr = Array.isArray(data.players) ? data.players : [];
    const myId = peer && peer.id ? peer.id : null;
    for(const pl of arr) {
      if(!pl) continue;
      if(myId && pl.id === myId) {
        myPoints = Number(pl.pts) || 0;
        continue;
      }
      const rp2 = ensureRemotePlayer(pl.pseudo, pl.skinId || 'classic', pl.id || null);
      if(rp2) {
        rp2.pts = Number(pl.pts) || 0;
        rp2.dead = !!pl.dead;
        rp2.spectating = !!pl.spectating;
      }
    }
    refreshResultPlayers();
  }
  else if(data.type === 'worldSync') {
    if(spectatorMode && data.world) {
      applyWorldSnapshot(data.world);
    }
  }
  else if(data.type === 'shoot') {
    const camDiff = data.camY - cameraY;
    opProjectiles.push({ x:data.sx, y:data.sy - camDiff, w:6, h:10, vx:data.vx, vy:data.vy });
    playShootSound();
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
  }
  else if(data.type === 'ready') {
    if(isHost) {
      rp._ready = true;
      if(startedSeed != null) return;
      const readyCount = conns.filter(p => p._ready).length;
      if(readyCount >= 1 && !matchActive) {
        gameSeed = Date.now();
        sendData({ type:'seed', seed: gameSeed });
        startCountdown();
      }
    }
  }
  else if(data.type === 'seed') {
    beginRoundWithSeed(data.seed);
  }
  else if(data.type === 'restart') {
    spectatorMode = false;
    beginRoundWithSeed(data.seed);
  }
  else if(data.type === 'spectate') {
    ++countdownCancelToken;
    countdownInProgress = false;
    spectatorWorldRaw = null;
    spectatorMode = true;
    spectatorTarget = 0;
    spectatorLastCamY = null;
    seedRandom(gameSeed || Date.now());
    init();
    running = true;
    dead = false;
    myDead = false;
    matchActive = true;
    lastTs = 0;
    showScreen(null);
    showNotification('Mode spectateur: prochaine manche pour jouer');
    updateSpectatorControls();
    requestAnimationFrame(loop);
    updateHUD();
  }
  else if(data.type === 'quit') {
    const quitName = data.pseudo || rp.pseudo;
    conns = conns.filter(p => p !== rp);
    showNotification(quitName + ' a quitté la partie');
    if(isHost) { for(const p2 of conns) sendTo(p2, {type:'playerLeft', id:rp.id, pseudo:quitName}); }
    refreshResultPlayers();
    if (!matchActive && conns.length > 0 && meReadyForNext && allOpponentsReady()) {
      startNextRound();
      return;
    }
    if(conns.length === 0) {
      running = false; matchActive = false;
      showScreen('resultScreen');
      const rs = document.getElementById('resultScreen');
      rs.classList.remove('hidden'); rs.classList.add('visible');
      document.getElementById('resultTitle').textContent = quitName + ' a quitté la partie.';
      document.getElementById('resultTitle').className = 'result-title lose';
      document.getElementById('btnPlayAgain').style.display = 'none';
      document.getElementById('btnBackMenu').style.display = 'none';
      document.getElementById('readyStatus').textContent = 'Retour au menu dans 5s...';
      setTimeout(() => {
        for(const p of conns) { if(p.conn) try{p.conn.close();}catch(e){} }
        if(peer) try{peer.destroy();}catch(e){}
        conns=[]; peer=null; connected=false;
        showScreen('lobbyScreen');
        lobbyActive=true; lobbyLastTs=0; requestAnimationFrame(lobbyLoop);
        document.getElementById('btnPlayAgain').style.display='';
        document.getElementById('btnBackMenu').style.display='';
        document.getElementById('readyStatus').textContent='';
        document.getElementById('btnSearch').disabled=false;
        document.getElementById('lobbyStatus').textContent='';
        myPoints=0;
      }, 5000);
    }
  }
  else if(data.type === 'playerLeft') {
    const target = (data.id ? conns.find(p => p.id === data.id) : null) || conns.find(p => p.pseudo === data.pseudo);
    if(target) conns = conns.filter(p => p !== target);
    showNotification(data.pseudo + ' a quitté la partie');
    refreshResultPlayers();
    if(isHost) broadcastRoster();
    if (!matchActive && conns.length > 0 && meReadyForNext && allOpponentsReady()) {
      startNextRound();
    }
  }
  else if(data.type === 'shieldPickup') {
    shieldItem = null;
    shieldSpawned = true;
    playShieldSound();
    setTimeout(() => { stopShieldSound(); }, 30000);
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
  }
  else if(data.type === 'kickVote') {
    kickVotes.add(data.voterId);
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
    updateKickStatus();
    if(kickVotes.size >= getKickThreshold()) executeKick();
  }
  else if(data.type === 'kickRequest') {
    if(isHost) {
      const target = conns.find(p => p.id === data.id);
      if(target && !target.readyForNext) {
        sendTo(target, { type:'kicked' });
        setTimeout(() => { try { target.conn.close(); } catch(e){} }, 200);
        conns = conns.filter(x => x !== target);
        for(const p2 of conns) sendTo(p2, { type:'playerLeft', id: target.id, pseudo: target.pseudo });
        broadcastRoster();
        showNotification(target.pseudo + ' a été expulsé');
        resetKickVote();
        refreshResultPlayers();
        if(meReadyForNext && allOpponentsReady()) startNextRound();
      }
    }
  }
  else if(data.type === 'kicked') {
    showKickedScreen();
  }
  else if(data.type === 'hostTransfer') {
    hostTransferPending = true;
    const myId = peer && peer.id ? peer.id : null;
    const newSeed = data.seed;
    const iAmNewHost = (myId === data.newHostId);

    // Remove old host from conns (their connection is closing)
    conns = conns.filter(p => p.conn && p.conn.open && p.id !== (rp ? rp.id : null));

    if(iAmNewHost) {
      isHost = true;
      gameSeed = newSeed;
      // Connect to other remaining players
      for(const pl of (data.players || [])) {
        if(!pl.id || pl.id === myId) continue;
        if(conns.find(p => p.id === pl.id)) continue;
        const nc = peer.connect(pl.id, { reliable: true });
        const newRp = ensureRemotePlayer(pl.pseudo, pl.skinId || 'classic', pl.id);
        if(newRp) { newRp.conn = nc; newRp.pts = pl.pts || 0; newRp.readyForNext = true; }
        nc.on('open', () => {
          nc.on('data', (d) => onData(d, nc));
          nc.on('close', () => {
            const pp = getOpponentByConn(nc);
            if(pp) {
              conns = conns.filter(x => x !== pp);
              showNotification(pp.pseudo + ' a quitté la partie');
              broadcastRoster();
            }
          });
          sendTo(newRp, { type:'newHost', hostId: myId, pseudo: myPseudo, skinId: SKINS[currentSkinIndex].id, pts: myPoints });
          setTimeout(() => {
            resetKickVote();
            startNextRound();
          }, 300);
        });
      }
      if((data.players || []).filter(p => p.id !== myId).length === 0) {
        resetKickVote();
        startNextRound();
      }
    } else {
      // Not the new host — wait for new host to connect to us
      gameSeed = newSeed;
      isHost = false;
      conns = conns.filter(p => p.conn && p.conn.open);
      resetKickVote();
      // Accept incoming connection from new host
      let migrateHandled = false;
      const onMigrate = (nc) => {
        if(migrateHandled) return;
        migrateHandled = true;
        const setup = () => {
          let gotFirst = false;
          nc.on('data', (d) => {
            if(!gotFirst && d && d.type === 'newHost') {
              gotFirst = true;
              hostTransferPending = false;
              const hostRp = ensureRemotePlayer(d.pseudo, d.skinId || 'classic', d.hostId);
              if(hostRp) {
                hostRp.conn = nc;
                hostRp.pts = d.pts || 0;
                hostRp.readyForNext = true;
              }
              conns = conns.filter(p => p.conn && p.conn.open);
              showNotification('Nouvel hôte: ' + d.pseudo);
              return;
            }
            gotFirst = true;
            onData(d, nc);
          });
          nc.on('close', () => {
            if(hostTransferPending) return;
            showNotification('Hôte déconnecté');
            connected = false;
            conns = [];
            if(matchActive) { running=false; matchActive=false; showResults(); }
          });
        };
        if(nc.open) setup();
        else nc.on('open', setup);
      };
      peer.on('connection', onMigrate);
    }
  }
  else if(data.type === 'chat') {
    appendChatMessage(data.pseudo, data.msg, false);
    if(!chatOpen) document.getElementById('chatBadge').style.display = '';
    if(isHost) { for(const p2 of conns) { if(p2!==rp) sendTo(p2, data); } }
  }
}

function showScreen(id) {
  ['lobbyScreen','waitingScreen','getReadyScreen','goScreen','resultScreen','skinScreen'].forEach(s => {
    const el = document.getElementById(s);
    el.classList.add('hidden');
    el.classList.remove('visible');
  });
  if(id) document.getElementById(id).classList.remove('hidden');
  // Chat only visible on result screen
  const chatVisible = (id === 'resultScreen');
  document.getElementById('chatToggle').style.display = chatVisible ? '' : 'none';
  if(!chatVisible) { document.getElementById('chatPanel').style.display = 'none'; chatOpen = false; }
}

function startSearch() {
  initAudio();
  tryEnableGyro(); // Must be called from user gesture for iOS permission
  myPseudo = document.getElementById('pseudoInput').value.trim() || 'Joueur';
  document.getElementById('lobbyStatus').textContent = 'Connexion...';
  document.getElementById('btnSearch').disabled = true;
  connected = false;
  conns = [];
  showScreen('waitingScreen');
  tryMatchmaking();
}

function tryMatchmaking() {
  // 🎯 Objectif :
  // 1. Essayer de rejoindre une room existante
  // 2. Sinon devenir host

  const myId = LOBBY_PREFIX + 'p-' + Math.random().toString(36).substr(2, 8);
  peer = new Peer(myId);

  peer.on('error', (err) => {
    console.warn('Peer error:', err);
    if (err.type === 'peer-unavailable') return; // normal pendant les tests de rooms
  });

  peer.on('open', () => {
    console.log('My peer ID:', peer.id);

    let joined = false;

    for (let i = 0; i < NUM_ROOMS; i++) {
      const roomId = LOBBY_PREFIX + 'room-' + i;
      const c = peer.connect(roomId, { reliable: true });

      c.on('open', () => {
        if (joined || connected) {
          try { c.close(); } catch (e) {}
          return;
        }

        joined = true;
        connected = true;
        isHost = false;

        const rp = {
          id: c.peer,
          conn: c,
          pseudo: 'Hôte',
          skinId: 'classic',
          playerImg: skinImages['classic'],
          shootImg: skinShootImages['classic'],
          data: makeDefaultData(),
          dead: false,
          pts: 0,
          readyForNext: false,
          spectating: false,
          _wasJumping: false,
          _ready: false,
          _listenersAttached: true
        };

        conns.push(rp);

        console.log('Joined room:', roomId);

        c.on('data', (d) => onData(d, c));
        c.on('close', () => {
          if(hostTransferPending) {
            // Host migration in progress, don't wipe state
            conns = conns.filter(p => p.conn && p.conn.open && p.conn !== c);
            return;
          }
          showNotification('Hôte déconnecté');
          connected = false;
          conns = [];
          if(matchActive) { running=false; matchActive=false; showResults(); }
        });

        onConnected();
      });

      c.on('error', () => {
        // ignoré → room inexistante
      });

      // ⏱️ fermer les connexions inutiles
      setTimeout(() => {
        if (!joined && c.open) {
          try { c.close(); } catch (e) {}
        }
      }, 1500);
    }

    // 🏠 Si aucune room trouvée → devenir host
    setTimeout(() => {
      if (joined || connected) return;
      becomeHost();
    }, 2000);
  });
}

function becomeHost() {
  if (connected) return;

  const roomIndex = Math.floor(Math.random() * NUM_ROOMS);
  const roomId = LOBBY_PREFIX + 'room-' + roomIndex;

  peer.destroy();
  peer = new Peer(roomId);

  peer.on('open', () => {
    console.log('Hosting room:', roomId);
  });

  peer.on('connection', (c) => {
    if (conns.length >= MAX_PLAYERS - 1) {
      try { c.close(); } catch (e) {}
      return;
    }

    isHost = true;

    const rp = {
      id: c.peer,
      conn: c,
      pseudo: 'Joueur',
      skinId: 'classic',
      playerImg: skinImages['classic'],
      shootImg: skinShootImages['classic'],
      data: makeDefaultData(),
      dead: false,
      pts: 0,
      readyForNext: false,
      spectating: false,
      _wasJumping: false,
      _ready: false
    };

    conns.push(rp);

    if (!connected) connected = true;

    console.log('Player joined, total:', conns.length);

    const setupConn = () => {
      if(rp._listenersAttached) return;
      // ✅ Listener UNIQUE
      c.on('data', (d) => onData(d, c));

      c.on('close', () => {
        const p = getOpponentByConn(c);
        if (p) {
          conns = conns.filter(x => x !== p);

          showNotification(p.pseudo + ' a quitté la partie');

          for (const p2 of conns) {
            sendTo(p2, { type: 'playerLeft', id: p.id, pseudo: p.pseudo });
          }
          broadcastRoster();

          if (matchActive && conns.length === 0 && !myDead) {
            showResults();
          }
          if (!matchActive && conns.length > 0 && meReadyForNext && allOpponentsReady()) {
            startNextRound();
          }
        }
      });

      // 🎮 Gestion du joueur entrant
      if (conns.length === 1) {
        // Premier joueur → démarrage normal
        onConnected();
      } else {
        // Joueur supplémentaire (ex: 3e joueur)
        sendTo(rp, {
          type: 'pseudo',
          id: peer && peer.id ? peer.id : null,
          pseudo: myPseudo,
          skinId: SKINS[currentSkinIndex].id
        });

        for(const p2 of conns) {
          if(p2 !== rp) sendTo(rp, { type:'playerJoined', id:p2.id, pseudo:p2.pseudo, skinId:p2.skinId });
        }

        if (matchActive) {
          rp.spectating = true;
          sendTo(rp, { type: 'spectate' });
          sendTo(rp, { type: 'worldSync', world: makeWorldSnapshot() });
        } else if (startedSeed != null) {
          // A round already happened — show score screen, wait for next round
          sendTo(rp, { type: 'showScores' });
        } else {
          sendTo(rp, { type: 'seed', seed: gameSeed });
        }

        showNotification(rp.pseudo + ' a rejoint la partie');

        // Informer les autres joueurs
        for (const p2 of conns) {
          if (p2 !== rp) {
            sendTo(p2, {
              type: 'playerJoined',
              id: rp.id,
              pseudo: rp.pseudo,
              skinId: rp.skinId
            });
          }
        }
      }
      broadcastRoster();
      rp._listenersAttached = true;
    };

    // ⚡ Important : gérer open + cas déjà ouvert
    c.on('open', setupConn);
    if (c.open) setupConn();
  });

  peer.on('error', (err) => {
    console.warn('Host error:', err);

    if (err.type === 'unavailable-id') {
      setTimeout(() => {
        if (connected) return;
        peer.destroy();
        becomeHost();
      }, 1500);
    }
  });
}

function onConnected() {
  console.log('Connected! isHost:', isHost);
  sendData({ type:'pseudo', id: peer && peer.id ? peer.id : null, pseudo:myPseudo, skinId:SKINS[currentSkinIndex].id });
  setTimeout(() => { sendData({ type:'ready' }); }, 500);
  if(isHost) {
    setTimeout(() => {
      if(!matchActive && conns.length >= 1 && startedSeed == null) {
        gameSeed = Date.now();
        sendData({ type:'seed', seed: gameSeed });
        startCountdown();
      }
    }, 3500);
  }
}

async function startCountdown() {
  if(countdownInProgress) return;
  countdownInProgress = true;
  const token = ++countdownCancelToken;
  lobbyActive = false;
  showScreen('getReadyScreen');
  await sleep(5000);
  if(token !== countdownCancelToken) { countdownInProgress = false; return; }
  showScreen('goScreen');
  playStartSound();
  if(!spectatorMode) startMatch();
  await sleep(1000);
  if(token !== countdownCancelToken) { countdownInProgress = false; return; }
  showScreen(null);
  countdownInProgress = false;
}

function startMatch() {
  startedSeed = gameSeed;
  initAudio();
  tryEnableGyro();
  seedRandom(gameSeed);
  matchActive = true;
  myDead = false;
  finishReached = false;
  spectatorMode = false;
  spectatorLastCamY = null;
  spectatorWorldRaw = null;
  lastMyWorldTs = 0;
  for(const p of conns) {
    p.data = makeDefaultData();
    p.dead = false;
    p.readyForNext = false;
    p.spectating = false;
    p._worldData = null;
  }
  init();
  player.vy = TRAMPOLINE_JUMP;
  running = true;
  dead = false;
  lastTs = 0;
  lastWorldSyncTs = 0;
  hud.textContent = '0';
  hudRight.textContent = '';
  // HUD: show all player scores
  updateHUD();
  if(isHost) broadcastRoster();
  updateSpectatorControls();
  requestAnimationFrame(loop);
}

function updateHUD() {
  if(!matchActive) return;
  const myScoreStr = Number.isFinite(score) ? Math.floor(score) : 0;
  if(spectatorMode) {
    const candidates = getSpectatorCandidates();
    const tgt = candidates.length ? candidates[Math.min(spectatorTarget, candidates.length-1)] : null;
    hud.textContent = 'SPEC ' + myScoreStr;
    if(tgt) hud.textContent = tgt.pseudo + ' ' + myScoreStr;
  } else {
    hud.textContent = myScoreStr;
  }
  // Left: round points
  const pts = [myPoints, ...conns.map(p=>p.pts)];
  hudLeft.textContent = pts.join(' - ');
  // Right: opponents scores
  const opScores = conns.map(p => p.pseudo + ': ' + Math.floor(Number(p.data.score) || 0));
  const camInfo = spectatorMode ? 'cam: ← / →' : '';
  hudRight.textContent = [camInfo, opScores.join(' | ')].filter(Boolean).join('   ');
}

  let ready = meReadyForNext ? 1 : 0;
  for(const p of conns) { if(p.readyForNext) ready++; }
  return Math.max(2, ready);

function showResults() {
  if(!running && dead && matchActive === false) return;
  running = false;
  matchActive = false;
  stopMonsterSound();
  stopSoucoupeSound();
  stopShieldSound();
  updateSpectatorControls();

  meReadyForNext = false;
  for(const p of conns) { p.readyForNext = false; p._ready = false; }
  document.getElementById('btnPlayAgain').disabled = false;
  document.getElementById('readyStatus').textContent = '';
  resetKickVote();
  initKickButton();

  // Spectator: no point attribution for local player
  if(spectatorMode) {
    const titleElSp = document.getElementById('resultTitle');
    titleElSp.textContent = 'Manche terminée';
    titleElSp.className = 'result-title win';
    document.getElementById('btnPlayAgain').textContent = 'Rejoindre la prochaine manche';
    const rsSp = document.getElementById('resultScreen');
    ['lobbyScreen','waitingScreen','getReadyScreen','goScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
    rsSp.classList.remove('hidden');
    rsSp.offsetHeight;
    rsSp.classList.add('visible');
    document.getElementById('chatToggle').style.display = '';
    refreshResultPlayers();
    return;
  }

  // Determine winner: who reached finish or last alive
  let won = false;
  if(finishReached) won = true;
  else if(myDead && !isAnyOpponentAlive()) won = false; // everyone dead
  else if(myDead) won = false;
  else won = true; // I'm alive and at least one opponent is dead

  if(won) myPoints++;
  else if(conns.some(p => !p.spectating)) {
    // Give point to best scoring alive active opponent (ignore pure spectators)
    const activeOpps = conns.filter(p => !p.spectating);
    let best = activeOpps[0];
    for(const p of activeOpps) { if(!p.dead && p.data.score > (best.dead ? -1 : best.data.score)) best = p; }
    if(best) best.pts++;
  }

  const titleEl = document.getElementById('resultTitle');
  const maxOpPts = Math.max(0, ...conns.map(p=>p.pts));
  const matchOver = myPoints >= MAX_POINTS || maxOpPts >= MAX_POINTS;
  if(matchOver) {
    if(myPoints >= MAX_POINTS) { titleEl.textContent = '🏆 Victoire finale !'; titleEl.className = 'result-title win'; }
    else { titleEl.textContent = '💀 Défaite finale...'; titleEl.className = 'result-title lose'; }
  } else {
    titleEl.textContent = won ? 'Vous gagnez la manche !' : 'Vous avez perdu la manche !';
    titleEl.className = 'result-title ' + (won ? 'win' : 'lose');
  }

  if(isHost) { broadcastRoster(); broadcastFinalScores(); }

  // Change button text if match is over
  document.getElementById('btnPlayAgain').textContent = matchOver ? 'Nouvelle partie' : 'Manche suivante';

  const rs = document.getElementById('resultScreen');
  ['lobbyScreen','waitingScreen','getReadyScreen','goScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
  rs.classList.remove('hidden');
  rs.offsetHeight;
  rs.classList.add('visible');
  document.getElementById('chatToggle').style.display = '';
  refreshResultPlayers();
}

// ── Mobile controls ──
let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
let gyroEnabled = false;
let gyroGamma = 0;
let sensorsListening = false;
let moveTouchId = null;

function tryEnableGyro() {
  if(!isMobile) return;
  // iOS requires permission from user gesture
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if(r === 'granted' && !sensorsListening) listenSensors();
    }).catch(()=>{});
    return;
  }
  // Android / other — just start listening (idempotent)
  if(!sensorsListening) listenSensors();
}

function listenSensors() {
  if(sensorsListening) return;
  sensorsListening = true;
  let source = '';

  // Classic deviceorientation
  window.addEventListener('deviceorientation', e => {
    if(e.gamma === null) return;
    gyroEnabled = true; source = 'orientation';
    const orient = screen.orientation ? screen.orientation.angle : (window.orientation || 0);
    if(orient === 90) gyroGamma = -e.beta;
    else if(orient === -90 || orient === 270) gyroGamma = e.beta;
    else gyroGamma = e.gamma;
  });

  // Accelerometer API fallback
  setTimeout(() => {
    if(source) return;
    try {
      if('Accelerometer' in window) {
        const accel = new Accelerometer({frequency: 30});
        accel.addEventListener('reading', () => {
          if(source === 'orientation') return;
          gyroEnabled = true; source = 'accel';
          gyroGamma = (accel.x / 9.8) * 45;
        });
        accel.start();
      }
    } catch(e) {}
  }, 500);

  // devicemotion fallback
  setTimeout(() => {
    if(source) return;
    window.addEventListener('devicemotion', e => {
      if(source === 'orientation' || source === 'accel') return;
      const acc = e.accelerationIncludingGravity;
      if(!acc || acc.x === null) return;
      gyroEnabled = true; source = 'motion';
      gyroGamma = -(acc.x / 9.8) * 45;
    });
  }, 1500);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  tryEnableGyro();
  if(!running||stunned||suckedIn||dead||spectatorMode) return;

  if(isMobile && gyroEnabled) {
    // Gyro mode: all touches = shoot
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      const rect=canvas.getBoundingClientRect();
      const tx=(t.clientX-rect.left)*(W/rect.width);
      const ty=(t.clientY-rect.top)*(H/rect.height);
      fireProjectile(tx,ty);
    }
    return;
  }

  if(isMobile && !gyroEnabled) {
    // No gyro: left 30%=move left, right 30%=move right, center=shoot
    for(let i=0;i<e.changedTouches.length;i++){
      const t=e.changedTouches[i];
      const rect=canvas.getBoundingClientRect();
      const relX=(t.clientX-rect.left)/rect.width;
      if(relX<0.30){moveTouchId=t.identifier;keys.l=true;keys.r=false;}
      else if(relX>0.70){moveTouchId=t.identifier;keys.r=true;keys.l=false;}
      else{const tx=(t.clientX-rect.left)*(W/rect.width);const ty=(t.clientY-rect.top)*(H/rect.height);fireProjectile(tx,ty);}
    }
    return;
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===moveTouchId){moveTouchId=null;keys.l=false;keys.r=false;}
  }
}, {passive:false});

canvas.addEventListener('touchcancel', e => {
  moveTouchId=null;keys.l=false;keys.r=false;
}, {passive:false});

// Gyro will be enabled on first user gesture (button click or touch)

function fireProjectile(targetX,targetY) {
  if(spectatorMode) return;
  const startX=player.x+player.w/2, startY=player.y;
  let dx=targetX-startX, dy=targetY-startY;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len<1){dx=0;dy=-1;}else{dx/=len;dy/=len;}
  if(dy>0.1) dy=-0.05;
  const len2=Math.sqrt(dx*dx+dy*dy);dx/=len2;dy/=len2;
  const spd=16;
  projectiles.push({x:startX-4,y:startY-6,w:8,h:12,vx:dx*spd,vy:dy*spd});
  shooting=true;shootTimer=0;
  if(dx<-0.1)player.facing=-1;else if(dx>0.1)player.facing=1;
  playShootSound();
  // Send shoot to opponent
  sendData({ type:'shoot', sx:startX-4, sy:startY-6, vx:dx*spd, vy:dy*spd, camY:cameraY });
}

function executeKick() {
  // If I'm the one being kicked (not ready and vote passed)
  if(!meReadyForNext) {
    if(isHost) {
      // Host can't just disconnect — transfer host to a ready player first
      const readyPlayers = conns.filter(p => p.readyForNext && p.conn && p.conn.open);
      if(readyPlayers.length > 0) {
        const newHostPlayer = readyPlayers[0];
        const newSeed = Date.now();
        const allPlayers = readyPlayers.map(p => ({ id: p.id, pseudo: p.pseudo, skinId: p.skinId, pts: p.pts || 0 }));
        for(const p of readyPlayers) {
          sendTo(p, {
            type: 'hostTransfer',
            newHostId: newHostPlayer.id,
            seed: newSeed,
            players: allPlayers
          });
        }
      }
      setTimeout(showKickedScreen, 400);
    } else {
      showKickedScreen();
    }
    return;
  }

  const notReady = conns.filter(p => !p.readyForNext);
  for(const p of notReady) {
    if(isHost && p.conn) {
      sendTo(p, { type:'kicked' });
      setTimeout(() => { try { p.conn.close(); } catch(e){} }, 200);
    } else if(!isHost) {
      sendData({ type:'kickRequest', id: p.id, pseudo: p.pseudo });
    }
    showNotification(p.pseudo + ' a été expulsé');
  }
  if(isHost) {
    for(const p of notReady) {
      conns = conns.filter(x => x !== p);
      for(const p2 of conns) sendTo(p2, { type:'playerLeft', id: p.id, pseudo: p.pseudo });
    }
    broadcastRoster();
    resetKickVote();
    refreshResultPlayers();
    if(meReadyForNext && allOpponentsReady()) startNextRound();
  }
}

// LOBBY SCENE (rendered on canvas)
// ══════════════════════════════════════════
let lobbyActive = true;
let lobbyDoodlerY = H - 120;
let lobbyDoodlerVy = 0;
const LOBBY_PLAT_Y = H - 55;
const LOBBY_PLAT_X = 40;
const LOBBY_PLAT_W = 80;
let lobbyTime = 0;
let lobbyLastTs = 0;

// Decorative monsters positions
const lobbyDecos = [
  { img:'monsterImg', x:320, y:120, w:50, h:30 },
  { img:'soucoupeImg', x:280, y:40, w:90, h:55 },
  { img:'holeImg', x:330, y:350, w:50, h:50 },
  { img:'monsterImg', x:40, y:250, w:35, h:22 },
];

function lobbyLoop(ts) {
  if(!lobbyActive) return;
  if(!lobbyLastTs) lobbyLastTs = ts;
  const dt = Math.min(ts - lobbyLastTs, 33.33);
  lobbyLastTs = ts;
  const t = dt / 16.667;
  lobbyTime += t;

  // Physics matching in-game exactly
  lobbyDoodlerVy += GRAVITY * t;
  lobbyDoodlerY += lobbyDoodlerVy * t;
  // Land on platform
  if(lobbyDoodlerVy > 0 && lobbyDoodlerY + PLAYER_H >= LOBBY_PLAT_Y) {
    lobbyDoodlerY = LOBBY_PLAT_Y - PLAYER_H;
    lobbyDoodlerVy = JUMP_VEL;
    try { playJump(); } catch(e){}
  }

  // Draw
  ctx.save();

  // Background
  if(bgPattern) {
    ctx.fillStyle = bgPattern;
    ctx.fillRect(0, 0, W, H);
  } else if(bgImg.complete && bgImg.naturalWidth) {
    // Try to create pattern now
    const pc = document.createElement('canvas');
    pc.width = bgImg.naturalWidth; pc.height = bgImg.naturalHeight;
    pc.getContext('2d').drawImage(bgImg, 0, 0);
    bgPattern = ctx.createPattern(pc, 'repeat');
    ctx.fillStyle = bgPattern;
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);
  }

  // Decorative monsters
  for(const d of lobbyDecos) {
    const img = d.img === 'monsterImg' ? monsterImg : d.img === 'soucoupeImg' ? soucoupeImg : holeImg;
    if(img.complete && img.naturalWidth) {
      ctx.globalAlpha = 0.5;
      const floatY = Math.sin(lobbyTime * 0.03 + d.x) * 5;
      ctx.drawImage(img, d.x, d.y + floatY, d.w, d.h);
    }
  }
  ctx.globalAlpha = 1;

  // Platform
  if(greenPlatImg.complete && greenPlatImg.naturalWidth) {
    ctx.drawImage(greenPlatImg, LOBBY_PLAT_X, LOBBY_PLAT_Y, LOBBY_PLAT_W, 14);
  }

  // Doodler
  if(playerImg.complete && playerImg.naturalWidth) {
    ctx.save();
    const cx = LOBBY_PLAT_X + LOBBY_PLAT_W/2;
    const cy = lobbyDoodlerY + PLAYER_H/2;
    ctx.translate(cx, cy);
    // Squash-stretch
    let sq = 1;
    if(lobbyDoodlerVy < -2) sq = Math.max(0.85, 1 + lobbyDoodlerVy * 0.01);
    else if(lobbyDoodlerVy > 2) sq = Math.min(1.15, 1 + lobbyDoodlerVy * 0.008);
    ctx.scale(2 - sq, sq);
    ctx.drawImage(playerImg, -PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
    ctx.restore();
  }

  ctx.restore();
  requestAnimationFrame(lobbyLoop);
}

// Start lobby scene
requestAnimationFrame(lobbyLoop);
